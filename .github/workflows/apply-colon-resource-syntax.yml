name: Apply colon resource syntax

on:
  push:
    branches:
      - feat/colon-separated-resource-identifiers

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/colon-separated-resource-identifiers
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: python3 scripts/apply-colon-resource-syntax.py
      - run: npm run build
      - run: npm run check
      - name: Commit syntax changes
        run: |
          git add src/extension.ts tests/extension.test.ts README.md package.json dist/asset-manager.js
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: use colon-separated local resource identifiers"
          git push origin HEAD:feat/colon-separated-resource-identifiers
