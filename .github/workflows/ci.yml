name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - run: npm run docs:check
      - run: npm run check:dist
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: asset-manager-dist
          path: dist/
