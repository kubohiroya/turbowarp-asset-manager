name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Capture typecheck output
        run: npm run typecheck > typecheck.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: typecheck-log
          path: typecheck.log
