name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run check
      - name: Commit generated dist for tracking PR
        if: always() && github.event_name == 'pull_request' && github.head_ref == 'feat/issue-8-project-local-assets'
        run: |
          if [ -d dist ]; then
            git add dist
            if ! git diff --cached --quiet; then
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git commit -m "build: commit generated extension bundle"
              git push origin HEAD:${{ github.head_ref }}
            fi
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: asset-manager-dist
          path: dist/
