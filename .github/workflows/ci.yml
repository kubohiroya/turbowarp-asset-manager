name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npm run docs
      - name: Commit generated files
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f CHANGELOG-animation-assets.md docs/animation-assets-argument-migration.md
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/ci.yml README.md dist/asset-manager.js
          git add -u CHANGELOG-animation-assets.md docs/animation-assets-argument-migration.md
          git commit -m "build: regenerate animation asset documentation and dist"
          git push origin HEAD:${{ github.head_ref }}
